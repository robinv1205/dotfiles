general {
    disable_loading_bar = true
    grace = 300
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = /home/$USER/Pictures/backgrounds/grid.jpg
    blur_passes = 1 
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor = DP-1
    size = 250, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(00A8E8) to rgb(007ACC) to rgb(005B9A)
    inner_color = rgba(00000011)
    font_color = rgb(ffffff)
    fade_on_empty = true
    font_family = JetBrainsMono Nerd Font
    placeholder_text = password   
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = Hello, $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 25
    position = 0, 80
    halign = center
    valign = center
}

label {
	monitor = DP-1
	text = cmd[update:1000] echo "$TIME"
	color = rgba(255, 255, 255, 1.0)
	font_size = 156
	position = 0, 320
	halign = center
	valign = center
	paddint_bottom = 10px
}
